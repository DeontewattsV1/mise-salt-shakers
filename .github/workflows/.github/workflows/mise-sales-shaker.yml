name: Mise Sales Shaker

on:
  workflow_dispatch:
    inputs:
      shaker_mode:
        description: "How much seasoning to apply"
        required: false
        default: "standard"
        type: choice
        options:
          - light
          - standard
          - full
      target_branch:
        description: "Branch to compare against"
        required: false
        default: "main"
        type: string

  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

  push:
    branches:
      - main
      - master
      - develop
      - "release/**"

  schedule:
    - cron: "17 15 * * 1"

permissions:
  contents: read
  pull-requests: read
  issues: read
  actions: read

concurrency:
  group: mise-sales-shaker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  MISE_SHAKER_NAME: "Mise Sales Shaker"
  MISE_SHAKER_VERSION: "1.0.0"
  DEFAULT_TARGET_BRANCH: ${{ inputs.target_branch || 'main' }}
  SHAKER_MODE: ${{ inputs.shaker_mode || 'standard' }}

jobs:
  discover:
    name: Discover repo flavor
    runs-on: ubuntu-latest
    outputs:
      has_node: ${{ steps.detect.outputs.has_node }}
      has_python: ${{ steps.detect.outputs.has_python }}
      has_go: ${{ steps.detect.outputs.has_go }}
      has_rust: ${{ steps.detect.outputs.has_rust }}
      has_java: ${{ steps.detect.outputs.has_java }}
      has_dotnet: ${{ steps.detect.outputs.has_dotnet }}
      has_cpp: ${{ steps.detect.outputs.has_cpp }}
      has_php: ${{ steps.detect.outputs.has_php }}
      has_ruby: ${{ steps.detect.outputs.has_ruby }}
      has_shell: ${{ steps.detect.outputs.has_shell }}
      has_docker: ${{ steps.detect.outputs.has_docker }}
      has_docs: ${{ steps.detect.outputs.has_docs }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect repository ingredients
        id: detect
        run: |
          set -euo pipefail

          bool() {
            if eval "$1"; then
              echo "true"
            else
              echo "false"
            fi
          }

          {
            echo "has_node=$(bool 'test -f package.json')"
            echo "has_python=$(bool 'test -f pyproject.toml || test -f requirements.txt || find . -maxdepth 3 -name \"*.py\" | grep -q .')"
            echo "has_go=$(bool 'test -f go.mod')"
            echo "has_rust=$(bool 'test -f Cargo.toml')"
            echo "has_java=$(bool 'test -f pom.xml || test -f build.gradle || test -f build.gradle.kts')"
            echo "has_dotnet=$(bool 'find . -maxdepth 4 \( -name \"*.csproj\" -o -name \"*.sln\" \) | grep -q .')"
            echo "has_cpp=$(bool 'test -f CMakeLists.txt || find . -maxdepth 4 \( -name \"*.cpp\" -o -name \"*.cc\" -o -name \"*.cxx\" -o -name \"*.hpp\" \) | grep -q .')"
            echo "has_php=$(bool 'test -f composer.json')"
            echo "has_ruby=$(bool 'test -f Gemfile || test -f *.gemspec')"
            echo "has_shell=$(bool 'find . -maxdepth 4 -name \"*.sh\" | grep -q .')"
            echo "has_docker=$(bool 'test -f Dockerfile || test -f docker-compose.yml || test -f compose.yml')"
            echo "has_docs=$(bool 'test -f README.md || test -d docs')"
          } >> "$GITHUB_OUTPUT"

      - name: Write discovery summary
        run: |
          set -euo pipefail

          {
            echo "# 🧂 Mise Sales Shaker"
            echo ""
            echo "**Concept:** goes with everything, makes everything better."
            echo ""
            echo "## Repository Flavor Map"
            echo ""
            echo "| Ingredient | Detected |"
            echo "|---|---:|"
            echo "| Node / TypeScript / JavaScript | ${{ steps.detect.outputs.has_node }} |"
            echo "| Python | ${{ steps.detect.outputs.has_python }} |"
            echo "| Go | ${{ steps.detect.outputs.has_go }} |"
            echo "| Rust | ${{ steps.detect.outputs.has_rust }} |"
            echo "| Java / JVM | ${{ steps.detect.outputs.has_java }} |"
            echo "| .NET | ${{ steps.detect.outputs.has_dotnet }} |"
            echo "| C / C++ | ${{ steps.detect.outputs.has_cpp }} |"
            echo "| PHP | ${{ steps.detect.outputs.has_php }} |"
            echo "| Ruby | ${{ steps.detect.outputs.has_ruby }} |"
            echo "| Shell | ${{ steps.detect.outputs.has_shell }} |"
            echo "| Docker | ${{ steps.detect.outputs.has_docker }} |"
            echo "| Docs | ${{ steps.detect.outputs.has_docs }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  season:
    name: Season detected stacks
    runs-on: ubuntu-latest
    needs: discover

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Prepare shaker report
        run: |
          set -euo pipefail
          mkdir -p .mise-shaker
          : > .mise-shaker/results.md

          {
            echo "# Mise Sales Shaker Quality Pass"
            echo ""
            echo "| Stack | Status | Notes |"
            echo "|---|---|---|"
          } >> .mise-shaker/results.md

      - name: Node / TypeScript / JavaScript pass
        if: needs.discover.outputs.has_node == 'true'
        run: |
          set +e

          status="pass"
          notes=()

          if [[ -f package-lock.json ]]; then
            npm ci
          else
            npm install --ignore-scripts
          fi

          if npm run | grep -qE " lint"; then
            npm run lint || status="warn"
            notes+=("lint checked")
          else
            notes+=("no lint script")
          fi

          if npm run | grep -qE " test"; then
            npm test || status="warn"
            notes+=("tests checked")
          else
            notes+=("no test script")
          fi

          echo "| Node / TS / JS | ${status} | ${notes[*]} |" >> .mise-shaker/results.md

      - name: Python pass
        if: needs.discover.outputs.has_python == 'true'
        run: |
          set +e

          status="pass"
          notes=()

          python -m pip install --upgrade pip

          if [[ -f requirements.txt ]]; then
            python -m pip install -r requirements.txt || status="warn"
            notes+=("requirements installed")
          fi

          if [[ -f pyproject.toml ]]; then
            python -m pip install . || status="warn"
            notes+=("pyproject install checked")
          fi

          python -m pip install ruff pytest >/dev/null 2>&1 || true

          if find . -maxdepth 5 -name "*.py" | grep -q .; then
            python -m ruff check . || status="warn"
            notes+=("ruff checked")
          fi

          if [[ -d tests ]]; then
            python -m pytest || status="warn"
            notes+=("pytest checked")
          else
            notes+=("no tests directory")
          fi

          echo "| Python | ${status} | ${notes[*]} |" >> .mise-shaker/results.md

      - name: Go pass
        if: needs.discover.outputs.has_go == 'true'
        run: |
          set +e

          status="pass"
          go mod download || status="warn"
          go vet ./... || status="warn"
          go test ./... || status="warn"

          echo "| Go | ${status} | go vet + go test |" >> .mise-shaker/results.md

      - name: Rust pass
        if: needs.discover.outputs.has_rust == 'true'
        run: |
          set +e

          status="pass"
          cargo fmt --check || status="warn"
          cargo clippy --all-targets --all-features -- -D warnings || status="warn"
          cargo test --all-features || status="warn"

          echo "| Rust | ${status} | fmt + clippy + test |" >> .mise-shaker/results.md

      - name: Java / JVM pass
        if: needs.discover.outputs.has_java == 'true'
        run: |
          set +e

          status="pass"

          if [[ -f pom.xml ]]; then
            mvn test || status="warn"
            echo "| Java / Maven | ${status} | mvn test |" >> .mise-shaker/results.md
          elif [[ -x ./gradlew ]]; then
            ./gradlew test || status="warn"
            echo "| Java / Gradle | ${status} | gradlew test |" >> .mise-shaker/results.md
          else
            echo "| Java / JVM | warn | build file found, no executable wrapper detected |" >> .mise-shaker/results.md
          fi

      - name: .NET pass
        if: needs.discover.outputs.has_dotnet == 'true'
        run: |
          set +e

          status="pass"
          dotnet restore || status="warn"
          dotnet test --no-restore || status="warn"

          echo "| .NET | ${status} | restore + test |" >> .mise-shaker/results.md

      - name: C / C++ pass
        if: needs.discover.outputs.has_cpp == 'true'
        run: |
          set +e

          status="pass"

          if [[ -f CMakeLists.txt ]]; then
            cmake -S . -B build || status="warn"
            cmake --build build || status="warn"
            ctest --test-dir build --output-on-failure || status="warn"
            echo "| C / C++ | ${status} | cmake build + ctest |" >> .mise-shaker/results.md
          else
            echo "| C / C++ | warn | source detected, no CMakeLists.txt found |" >> .mise-shaker/results.md
          fi

      - name: PHP pass
        if: needs.discover.outputs.has_php == 'true'
        run: |
          set +e

          status="pass"
          composer install --no-interaction --prefer-dist || status="warn"

          if [[ -f vendor/bin/phpunit ]]; then
            vendor/bin/phpunit || status="warn"
            echo "| PHP | ${status} | composer + phpunit |" >> .mise-shaker/results.md
          else
            echo "| PHP | ${status} | composer install; no phpunit found |" >> .mise-shaker/results.md
          fi

      - name: Ruby pass
        if: needs.discover.outputs.has_ruby == 'true'
        run: |
          set +e

          status="pass"
          bundle install || status="warn"

          if bundle exec rake -T | grep -q "test"; then
            bundle exec rake test || status="warn"
            echo "| Ruby | ${status} | bundle + rake test |" >> .mise-shaker/results.md
          else
            echo "| Ruby | ${status} | bundle install; no test task found |" >> .mise-shaker/results.md
          fi

      - name: Shell pass
        if: needs.discover.outputs.has_shell == 'true'
        run: |
          set +e

          status="pass"
          sudo apt-get update
          sudo apt-get install -y shellcheck
          find . -maxdepth 5 -name "*.sh" -print0 | xargs -0 shellcheck || status="warn"

          echo "| Shell | ${status} | shellcheck |" >> .mise-shaker/results.md

      - name: Docker pass
        if: needs.discover.outputs.has_docker == 'true'
        run: |
          set +e

          status="pass"

          if [[ -f Dockerfile ]]; then
            docker build --no-cache -t mise-sales-shaker-local:ci . || status="warn"
            echo "| Docker | ${status} | docker build checked |" >> .mise-shaker/results.md
          else
            echo "| Docker | pass | compose file detected; no Dockerfile build attempted |" >> .mise-shaker/results.md
          fi

      - name: Publish seasoning summary
        run: |
          set -euo pipefail

          {
            echo ""
            echo "## Seasoning Results"
            cat .mise-shaker/results.md
          } >> "$GITHUB_STEP_SUMMARY"

  sales-readiness:
    name: Score repo sales readiness
    runs-on: ubuntu-latest
    needs:
      - discover
      - season
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate sales-readiness score
        run: |
          set -euo pipefail

          score=0
          max=100
          notes=()

          add_score() {
            local points="$1"
            local message="$2"
            score=$((score + points))
            notes+=("✅ ${message}")
          }

          miss() {
            local message="$1"
            notes+=("⚠️ ${message}")
          }

          [[ -f README.md ]] && add_score 15 "README.md present" || miss "Add README.md"
          [[ -f LICENSE || -f LICENSE.md ]] && add_score 10 "License present" || miss "Add LICENSE"
          [[ -f CONTRIBUTING.md || -f docs/CONTRIBUTING.md ]] && add_score 10 "Contribution path present" || miss "Add CONTRIBUTING.md"
          [[ -f SECURITY.md || -f docs/SECURITY.md ]] && add_score 10 "Security policy present" || miss "Add SECURITY.md"
          [[ -f CODE_OF_CONDUCT.md || -f docs/CODE_OF_CONDUCT.md ]] && add_score 5 "Code of conduct present" || miss "Add CODE_OF_CONDUCT.md"
          [[ -d docs ]] && add_score 10 "Docs directory present" || miss "Add docs/"
          [[ -f CHANGELOG.md || -f RELEASES.md ]] && add_score 10 "Release history present" || miss "Add CHANGELOG.md"
          [[ -f .github/dependabot.yml ]] && add_score 10 "Dependabot configured" || miss "Add .github/dependabot.yml"
          [[ -d .github/workflows ]] && add_score 10 "GitHub Actions present" || miss "Add workflow automation"
          [[ -f Dockerfile || -f docker-compose.yml || -f compose.yml ]] && add_score 10 "Deployment/container path present" || miss "Add Dockerfile or compose.yml"

          grade="Needs Mise"
          if (( score >= 85 )); then
            grade="Shelf Ready"
          elif (( score >= 70 )); then
            grade="Almost Ready"
          elif (( score >= 50 )); then
            grade="Needs Seasoning"
          fi

          {
            echo "# Mise Sales Shaker Sales Readiness"
            echo ""
            echo "**Score:** ${score}/${max}"
            echo ""
            echo "**Grade:** ${grade}"
            echo ""
            echo "## Checks"
            echo ""
            for note in "${notes[@]}"; do
              echo "- ${note}"
            done
            echo ""
            echo "## Recommendation"
            echo ""
            if (( score < 70 )); then
              echo "Prioritize README, docs, security policy, contribution path, and release notes before promotion."
            elif (( score < 85 )); then
              echo "Repo is close. Add polish: changelog, examples, demo path, and clearer onboarding."
            else
              echo "Repo is promotion-ready. Keep the seasoning fresh with scheduled checks."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  branch-advisor:
    name: Recommend next branch
    runs-on: ubuntu-latest
    needs:
      - discover
      - season
      - sales-readiness
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Inspect branches without mutating repository
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TARGET_BRANCH: ${{ env.DEFAULT_TARGET_BRANCH }}
        run: |
          set -euo pipefail

          git fetch --all --prune

          current_branch="${GITHUB_REF_NAME}"
          target_branch="${TARGET_BRANCH}"

          if ! git show-ref --verify --quiet "refs/remotes/origin/${target_branch}"; then
            if git show-ref --verify --quiet "refs/remotes/origin/master"; then
              target_branch="master"
            else
              target_branch="${current_branch}"
            fi
          fi

          mapfile -t branches < <(
            git for-each-ref refs/remotes/origin \
              --format="%(refname:short)|%(committerdate:iso8601)" \
              | grep -v "origin/HEAD" \
              | sort -t "|" -k2 -r \
              | head -20
          )

          best_branch=""
          best_reason="No candidate branch found."

          for row in "${branches[@]}"; do
            branch="${row%%|*}"
            clean="${branch#origin/}"

            [[ "${clean}" == "${target_branch}" ]] && continue
            [[ "${clean}" == "main" ]] && continue
            [[ "${clean}" == "master" ]] && continue

            ahead="$(git rev-list --count "origin/${target_branch}..${branch}" 2>/dev/null || echo 0)"
            behind="$(git rev-list --count "${branch}..origin/${target_branch}" 2>/dev/null || echo 999)"

            if [[ "${ahead}" -gt 0 && "${behind}" -le 20 ]]; then
              best_branch="${clean}"
              best_reason="${clean} is ${ahead} commit(s) ahead of ${target_branch} and ${behind} commit(s) behind."
              break
            fi
          done

          open_prs="$(gh pr list --repo "${REPO}" --state open --json number,title,headRefName,baseRefName,isDraft,mergeable,updatedAt --limit 20 || echo "[]")"

          {
            echo "# Mise Sales Shaker Branch Advisor"
            echo ""
            echo "**Target branch:** \`${target_branch}\`"
            echo ""
            if [[ -n "${best_branch}" ]]; then
              echo "**Recommended next branch:** \`${best_branch}\`"
              echo ""
              echo "**Reason:** ${best_reason}"
              echo ""
              echo "Suggested local commands:"
              echo ""
              echo '```bash'
              echo "git fetch origin"
              echo "git checkout ${target_branch}"
              echo "git pull --ff-only origin ${target_branch}"
              echo "git checkout ${best_branch}"
              echo "git rebase origin/${target_branch}"
              echo "git push --force-with-lease origin ${best_branch}"
              echo "# Then open or update a PR into ${target_branch}"
              echo '```'
            else
              echo "**Recommended next branch:** none"
              echo ""
              echo "${best_reason}"
            fi

            echo ""
            echo "## Open PR Snapshot"
            echo ""
            echo '```json'
            echo "${open_prs}"
            echo '```'
            echo ""
            echo "## Safety Rule"
            echo ""
            echo "This workflow only recommends. It does not merge, push, delete branches, or edit repository files."
          } >> "$GITHUB_STEP_SUMMARY"

  final-verdict:
    name: Final shaker verdict
    runs-on: ubuntu-latest
    needs:
      - discover
      - season
      - sales-readiness
      - branch-advisor
    if: always()

    steps:
      - name: Print final verdict
        run: |
          set -euo pipefail

          {
            echo "# Final Mise Sales Shaker Verdict"
            echo ""
            echo "| Layer | Result |"
            echo "|---|---|"
            echo "| Discovery | ${{ needs.discover.result }} |"
            echo "| Stack seasoning | ${{ needs.season.result }} |"
            echo "| Sales readiness | ${{ needs.sales-readiness.result }} |"
            echo "| Branch advisor | ${{ needs.branch-advisor.result }} |"
            echo ""
            echo "**Operating principle:** every repo gets better seasoning, but no automation gets to touch the stove without permission."
          } >> "$GITHUB_STEP_SUMMARY"
