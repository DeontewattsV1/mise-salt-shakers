name: mise salt shaker
run-name: >-
mise salt shaker · ${{ github.event_name }} · ${{ github.ref_name }} ·
${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mode ||
'standard' }}
on:
workflow_dispatch:
inputs:
mode:
description: Depth of checks to run
required: false
default: standard
type: choice
options:
- light
- standard
- full
target_branch:
description: Branch to compare against in the branch advisor
required: false
default: main
type: string
pull_request:
types:
- opened
- synchronize
- reopened
- ready_for_review
push:
branches:
- main
- master
- develop
- 'release/**'
permissions:
contents: read
concurrency:
group: mise-salt-shaker-${{ github.workflow }}-${{ github.ref }}
cancel-in-progress: true
defaults:
run:
shell: bash
env:
RUN_MODE: ${{ github.event_name == 'workflow_dispatch' &&
github.event.inputs.mode || 'standard' }}
REQUESTED_TARGET_BRANCH: ${{ github.event_name == 'workflow_dispatch' &&
github.event.inputs.target_branch || '' }}
jobs:
discover:
name: Discover repository profile
runs-on: ubuntu-latest
timeout-minutes: 10
outputs:
target_branch: ${{ steps.detect.outputs.target_branch }}
has_node: ${{ steps.detect.outputs.has_node }}
has_python: ${{ steps.detect.outputs.has_python }}
has_go: ${{ steps.detect.outputs.has_go }}
has_rust: ${{ steps.detect.outputs.has_rust }}
has_java: ${{ steps.detect.outputs.has_java }}
has_dotnet: ${{ steps.detect.outputs.has_dotnet }}
has_cpp: ${{ steps.detect.outputs.has_cpp }}
has_php: ${{ steps.detect.outputs.has_php }}
has_ruby: ${{ steps.detect.outputs.has_ruby }}
has_shell: ${{ steps.detect.outputs.has_shell }}
has_docker: ${{ steps.detect.outputs.has_docker }}
has_docs: ${{ steps.detect.outputs.has_docs }}
steps:
- name: Check out repository
uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
with:
fetch-depth: 0
persist-credentials: false
- name: Detect languages and repository signals
id: detect
run: |
set -euo pipefail
bool() {
if eval "$1"; then
echo "true"
else
echo "false"
fi
}
target_branch="${REQUESTED_TARGET_BRANCH:-}"
if [[ -z "${target_branch}" ]]; then
target_branch="${{ github.event.repository.default_branch }}"
fi
if [[ -z "${target_branch}" ]]; then
target_branch="main"
fi
{
echo "target_branch=${target_branch}"
echo "has_node=$(bool 'test -f package.json')"
echo "has_python=$(bool 'test -f pyproject.toml || test -f
requirements.txt || find . -maxdepth 4 -type f -name \"*.py\" -print -quit |
grep -q .')"
echo "has_go=$(bool 'test -f go.mod')"
echo "has_rust=$(bool 'test -f Cargo.toml')"
echo "has_java=$(bool 'test -f pom.xml || test -f build.gradle ||
test -f build.gradle.kts || test -x ./mvnw || test -x ./gradlew')"
echo "has_dotnet=$(bool 'find . -maxdepth 4 -type f \( -name
\"*.sln\" -o -name \"*.csproj\" \) -print -quit | grep -q .')"
echo "has_cpp=$(bool 'test -f CMakeLists.txt || find . -maxdepth 4 -
type f \( -name \"*.c\" -o -name \"*.cc\" -o -name \"*.cpp\" -o -name \"*.cxx\"
-o -name \"*.hpp\" -o -name \"*.h\" \) -print -quit | grep -q .')"
echo "has_php=$(bool 'test -f composer.json')"
echo "has_ruby=$(bool 'test -f Gemfile || find . -maxdepth 3 -type f -name
\"*.gemspec\" -print -quit | grep -q .')"
echo "has_shell=$(bool 'find . -maxdepth 4 -type f -name \"*.sh\" -
print -quit | grep -q .')"
echo "has_docker=$(bool 'test -f Dockerfile || test -f docker-
compose.yml || test -f docker-compose.yaml || test -f compose.yml || test -f
compose.yaml')"
echo "has_docs=$(bool 'test -f README.md || test -d docs')"
} >> "$GITHUB_OUTPUT"
\` |"
- name: Publish discovery summary
run: |
{
echo "# mise salt shaker"
echo
echo "| Signal | Detected |"
echo "|---|---:|"
echo "| Target branch | \`${{ steps.detect.outputs.target_branch }}
echo "| Node / JS / TS | ${{ steps.detect.outputs.has_node }} |"
echo "| Python | ${{ steps.detect.outputs.has_python }} |"
echo "| Go | ${{ steps.detect.outputs.has_go }} |"
echo "| Rust | ${{ steps.detect.outputs.has_rust }} |"
echo "| Java | ${{ steps.detect.outputs.has_java }} |"
echo "| .NET | ${{ steps.detect.outputs.has_dotnet }} |"
echo "| C / C++ | ${{ steps.detect.outputs.has_cpp }} |"
echo "| PHP | ${{ steps.detect.outputs.has_php }} |"
echo "| Ruby | ${{ steps.detect.outputs.has_ruby }} |"
echo "| Shell | ${{ steps.detect.outputs.has_shell }} |"
echo "| Docker | ${{ steps.detect.outputs.has_docker }} |"
echo "| Docs | ${{ steps.detect.outputs.has_docs }} |"
} >> "$GITHUB_STEP_SUMMARY"
season:
name: Run non-destructive checks
runs-on: ubuntu-latest
timeout-minutes: 40
needs: discover
steps:
- name: Check out repository
uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
with:
fetch-depth: 0
persist-credentials: false
- name: Initialize result file
run: |
{
echo "| Area | Status | Notes |"
echo "|---|---|---|"
} > "$RUNNER_TEMP/mise-salt-shaker-results.md"
- name: Node / JS / TS checks
if: needs.discover.outputs.has_node == 'true'
run: |
set -uo pipefail
status="pass"
notes=""
append_note() {
if [[ -n "${notes}" ]]; then
notes="${notes}; $1"
else
notes="$1"
fi
}
if [[ -f package-lock.json || -f npm-shrinkwrap.json ]]; then
if ! npm ci --ignore-scripts; then status="warn"; fi
append_note "install=npm-ci"
elif [[ -f pnpm-lock.yaml ]]; then
if ! corepack enable; then status="warn"; fi
if ! pnpm install --frozen-lockfile --ignore-scripts; then
status="warn"; fi
append_note "install=pnpm"
elif [[ -f yarn.lock ]]; then
if ! corepack enable; then status="warn"; fi
if ! yarn install --frozen-lockfile --ignore-scripts; then
status="warn"; fi
append_note "install=yarn"
else
status="warn"
append_note "install=skipped-no-lockfile"
fi
if ! npm run lint --if-present; then status="warn"; fi
append_note "lint=if-present"
if ! npm test --if-present; then status="warn"; fi
append_note "test=if-present"
if [[ "${RUN_MODE}" == "full" ]]; then
if ! npm run build --if-present; then status="warn"; fi
append_note "build=if-present"
fi
printf '| Node / JS / TS | %s | %s |\n' "$status" "${notes:-none}" >>
"$RUNNER_TEMP/mise-salt-shaker-results.md"
- name: Python checks
if: needs.discover.outputs.has_python == 'true'
run: |
set -uo pipefail
status="pass"
notes=""
append_note() {
if [[ -n "${notes}" ]]; then
notes="${notes}; $1"
else
notes="$1"
fi
}
fi
if ! python -m pip install --upgrade pip; then status="warn"; fi
append_note "pip=upgraded"
if [[ -f requirements.txt ]]; then
if ! python -m pip install -r requirements.txt; then status="warn";
append_note "requirements=requirements.txt"
fi
if [[ -f requirements-dev.txt ]]; then
if ! python -m pip install -r requirements-dev.txt; then
status="warn"; fi
append_note "requirements=requirements-dev.txt"
fi
if ! python -m pip install ruff pytest; then status="warn"; fi
append_note "tools=ruff,pytest"
if find . -type f -name '*.py' -not -path './.git/*' -print -quit |
grep -q .; then
if ! python -m ruff check .; then status="warn"; fi
append_note "lint=ruff"
fi
if find . -type f \( -path '*/tests/*' -o -name 'test_*.py' -o -name
'*_test.py' \) -print -quit | grep -q .; then
if ! python -m pytest -q; then status="warn"; fi
append_note "test=pytest"
else
append_note "test=skipped-no-tests"
fi
if [[ "${RUN_MODE}" == "full" ]]; then
if ! python -m compileall -q .; then status="warn"; fi
append_note "build=compileall"
f
printf '| Python | %s | %s |\n' "$status" "${notes:-none}" >>
"$RUNNER_TEMP/mise-salt-shaker-results.md"
- name: Go checks
if: needs.discover.outputs.has_go == 'true'
run: |
set -uo pipefail
status="pass"
notes=""
append_note() {
if [[ -n "${notes}" ]]; then
notes="${notes}; $1"
else
notes="$1"
fi
}
if ! go mod download; then status="warn"; fi
append_note "deps=go-mod-download"
if ! go vet ./...; then status="warn"; fi
append_note "lint=go-vet"
if ! go test ./...; then status="warn"; fi
append_note "test=go-test"
if [[ "${RUN_MODE}" == "full" ]]; then
if ! go build ./...; then status="warn"; fi
append_note "build=go-build"
fi
printf '| Go | %s | %s |\n' "$status" "${notes:-none}" >>
"$RUNNER_TEMP/mise-salt-shaker-results.md"
- name: Rust checks
if: needs.discover.outputs.has_rust == 'true'
run: |
set -uo pipefail
status="pass"
notes=""
append_note() {
if [[ -n "${notes}" ]]; then
notes="${notes}; $1"
else
notes="$1"
fi
}
if ! (cargo fetch --locked || cargo fetch); then status="warn"; fi
append_note "deps=cargo-fetch"
if ! cargo fmt --all --check; then status="warn"; fi
append_note "fmt=cargo-fmt"
if ! cargo clippy --workspace --all-targets --all-features -- -D
warnings; then status="warn"; fi
append_note "lint=clippy"
if ! cargo test --workspace --all-features; then status="warn"; fi
append_note "test=cargo-test"
if [[ "${RUN_MODE}" == "full" ]]; then
if ! cargo build --workspace --all-features; then status="warn"; fi
append_note "build=cargo-build"
fi
printf '| Rust | %s | %s |\n' "$status" "${notes:-none}" >>
"$RUNNER_TEMP/mise-salt-shaker-results.md"
- name: Java checks
if: needs.discover.outputs.has_java == 'true'
run: |
set -uo pipefail
status="pass"
notes=""
append_note() {
if [[ -n "${notes}" ]]; then
notes="${notes}; $1"
else
notes="$1"
fi
}
if [[ -x ./mvnw ]]; then
if ! ./mvnw -B -ntp test; then status="warn"; fi
append_note "build=maven-wrapper-test"
elif [[ -f pom.xml ]]; then
if ! mvn -B -ntp test; then status="warn"; fi
append_note "build=maven-test"
elif [[ -x ./gradlew ]]; then
if ! ./gradlew test --no-daemon; then status="warn"; fi
append_note "build=gradle-wrapper-test"
elif [[ -f build.gradle || -f build.gradle.kts ]]; then
if command -v gradle >/dev/null 2>&1; then
if ! gradle test --no-daemon; then status="warn"; fi
append_note "build=gradle-test"
else
status="warn"
append_note "build=skipped-no-gradle-wrapper"
fi
else
status="warn"
append_note "build=skipped-no-java-build-file"
fi
printf '| Java | %s | %s |\n' "$status" "${notes:-none}" >>
"$RUNNER_TEMP/mise-salt-shaker-results.md"
- name: .NET checks
if: needs.discover.outputs.has_dotnet == 'true'
run: |
set -uo pipefail
status="pass"
notes=""
append_note() {
if [[ -n "${notes}" ]]; then
notes="${notes}; $1"
else
notes="$1"
fi
}
if ! dotnet restore; then status="warn"; fi
append_note "restore=dotnet-restore"
status="warn"; fi
if ! dotnet build --no-restore --configuration Release; then
append_note "build=dotnet-build"
if find . -type f \( -name '*Test*.csproj' -o -name '*Tests*.csproj'
\) -print -quit | grep -q .; then
if ! dotnet test --no-build --configuration Release --verbosity
normal; then status="warn"; fi
append_note "test=dotnet-test"
else
append_note "test=skipped-no-test-project"
fi
printf '| .NET | %s | %s |\n' "$status" "${notes:-none}" >>
"$RUNNER_TEMP/mise-salt-shaker-results.md"
- name: C / C++ checks
if: needs.discover.outputs.has_cpp == 'true'
run: |
set -uo pipefail
status="pass"
notes=""
append_note() {
if [[ -n "${notes}" ]]; then
notes="${notes}; $1"
else
notes="$1"
fi
}
if [[ -f CMakeLists.txt ]]; then
if ! cmake -S . -B "$RUNNER_TEMP/cmake-build" -
DCMAKE_BUILD_TYPE=Release; then status="warn"; fi
if ! cmake --build "$RUNNER_TEMP/cmake-build" --parallel; then
status="warn"; fi
append_note "build=cmake"
if [[ "${RUN_MODE}" != "light" ]]; then
if ! ctest --test-dir "$RUNNER_TEMP/cmake-build" --output-on-
failure; then status="warn"; fi
append_note "test=ctest"
fi
else
status="warn"
append_note "build=skipped-no-cmake"
fi
printf '| C / C++ | %s | %s |\n' "$status" "${notes:-none}" >>
"$RUNNER_TEMP/mise-salt-shaker-results.md"
- name: PHP checks
if: needs.discover.outputs.has_php == 'true'
run: |
set -uo pipefail
status="pass"
notes=""
append_note() {
if [[ -n "${notes}" ]]; then
notes="${notes}; $1"
else
notes="$1"
fi
}
if ! composer install --no-interaction --no-progress --prefer-dist --
no-scripts; then status="warn"; fi
append_note "deps=composer-install"
if [[ -x vendor/bin/phpunit ]]; then
if ! vendor/bin/phpunit; then status="warn"; fi
append_note "test=phpunit"
elif [[ -f phpunit.xml || -f phpunit.xml.dist ]]; then
if command -v phpunit >/dev/null 2>&1; then
if ! phpunit; then status="warn"; fi
append_note "test=phpunit-global"
else
status="warn"
append_note "test=skipped-no-phpunit"
fi
else
append_note "test=skipped-no-phpunit-config"
fi
printf '| PHP | %s | %s |\n' "$status" "${notes:-none}" >>
"$RUNNER_TEMP/mise-salt-shaker-results.md"
- name: Ruby checks
if: needs.discover.outputs.has_ruby == 'true'
run: |
set -uo pipefail
status="pass"
notes=""
export BUNDLE_PATH="$RUNNER_TEMP/bundle"
append_note() {
if [[ -n "${notes}" ]]; then
notes="${notes}; $1"
else
notes="$1"
fi
}
if ! bundle install --jobs 4 --retry 3; then status="warn"; fi
append_note "deps=bundle-install"
if [[ -f Rakefile ]]; then
if ! bundle exec rake test; then
if ! bundle exec rake spec; then status="warn"; fi
fi
append_note "test=rake"
elif [[ -d spec ]]; then
if ! bundle exec rspec; then status="warn"; fi
append_note "test=rspec"
else
append_note "test=skipped-no-ruby-test-entrypoint"
fi
printf '| Ruby | %s | %s |\n' "$status" "${notes:-none}" >>
"$RUNNER_TEMP/mise-salt-shaker-results.md"
- name: Shell checks
if: needs.discover.outputs.has_shell == 'true'
run: |
set -uo pipefail
status="pass"
notes=""
append_note() {
if [[ -n "${notes}" ]]; then
notes="${notes}; $1"
else
notes="$1"
fi
}
if ! sudo apt-get update; then status="warn"; fi
if ! sudo apt-get install -y shellcheck; then status="warn"; fi
append_note "tool=shellcheck"
if find . -type f -name '*.sh' -not -path './.git/*' -print -quit |
grep -q .; then
if ! find . -type f -name '*.sh' -not -path './.git/*' -print0 |
xargs -0 -r shellcheck; then status="warn"; fi
append_note "lint=shellcheck"
else
append_note "lint=skipped-no-shell-files"
fi
printf '| Shell | %s | %s |\n' "$status" "${notes:-none}" >>
"$RUNNER_TEMP/mise-salt-shaker-results.md"
- name: Docker checks
if: needs.discover.outputs.has_docker == 'true'
run: |
set -uo pipefail
status="pass"
notes=""
append_note() {
if [[ -n "${notes}" ]]; then
notes="${notes}; $1"
else
notes="$1"
fi
}
compose_file=""
for f in docker-compose.yml docker-compose.yaml compose.yml
compose.yaml; do
if [[ -f "$f" ]]; then
compose_file="$f"
break
fi
done
if [[ -n "${compose_file}" ]]; then
if ! docker compose -f "${compose_file}" config -q; then
status="warn"; fi
append_note "compose=${compose_file}"
fi
if [[ -f Dockerfile ]]; then
if [[ "${RUN_MODE}" == "full" ]]; then
if ! docker build --pull --tag mise-salt-shaker:${GITHUB_SHA} .;
then status="warn"; fi
append_note "build=docker-build"
else
append_note "build=skipped-nonfull"
fi
fi
printf '| Docker | %s | %s |\n' "$status" "${notes:-none}" >>
"$RUNNER_TEMP/mise-salt-shaker-results.md"
- name: Publish season summary
run: |
results.md" || true)"
{
warnings="$(grep -c '| warn |' "$RUNNER_TEMP/mise-salt-shaker-
echo "## Non-destructive checks"
echo
echo "**Mode:** \`${RUN_MODE}\`"
echo
cat "$RUNNER_TEMP/mise-salt-shaker-results.md"
echo
echo "**Warnings:** ${warnings}"
echo
echo "This workflow is advisory: it summarizes checks, but it does
not push, merge, approve, or edit repository content."
} >> "$GITHUB_STEP_SUMMARY"
sales_readiness:
name: Score sales readiness
runs-on: ubuntu-latest
timeout-minutes: 10
needs: discover
steps:
- name: Check out repository
uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
with:
fetch-depth: 1
persist-credentials: false
- name: Calculate score
run: |
set -euo pipefail
score=0
max=100
add() {
shaker-score.md"
score=$((score + $1))
printf '| %s | ✅ | +%s |\n' "$2" "$1" >> "$RUNNER_TEMP/mise-salt-
}
miss() {
printf '| %s | ⚠️ | +0 |\n' "$1" >> "$RUNNER_TEMP/mise-salt-shaker-
score.md"
}
{
echo "| Signal | Status | Points |"
echo "|---|---|---:|"
} > "$RUNNER_TEMP/mise-salt-shaker-score.md"
[[ -f README.md ]] && add 15 "README" || miss "README"
[[ -f LICENSE || -f LICENSE.md ]] && add 10 "License" || miss
"License"
[[ -d docs ]] && add 10 "docs/" || miss "docs/"
[[ -f CONTRIBUTING.md || -f docs/CONTRIBUTING.md ]] && add 10
"CONTRIBUTING.md" || miss "CONTRIBUTING.md"
[[ -f SECURITY.md || -f docs/SECURITY.md ]] && add 10 "SECURITY.md" || miss
"SECURITY.md"
[[ -f CODE_OF_CONDUCT.md || -f docs/CODE_OF_CONDUCT.md ]] && add 5
"CODE_OF_CONDUCT.md" || miss "CODE_OF_CONDUCT.md"
[[ -f CHANGELOG.md || -f RELEASES.md ]] && add 10 "CHANGELOG /
RELEASES" || miss "CHANGELOG / RELEASES"
[[ -d .github/workflows ]] && add 10 ".github/workflows" || miss
".github/workflows"
[[ -f .github/dependabot.yml ]] && add 10 "Dependabot" || miss
"Dependabot"
[[ -d .github/ISSUE_TEMPLATE || -f .github/pull_request_template.md ]] && add 10
"Issue / PR templates" || miss "Issue / PR templates"
grade="needs seasoning"
if (( score >= 85 )); then
grade="promotion ready"
elif (( score >= 70 )); then
grade="close to ready"
elif (( score >= 50 )); then
grade="partially ready"
fi
{
echo "## Sales readiness"
echo
echo "**Score:** ${score}/${max}"
echo
echo "**Grade:** ${grade}"
echo
cat "$RUNNER_TEMP/mise-salt-shaker-score.md"
} >> "$GITHUB_STEP_SUMMARY"
branch_advisor:
name: Recommend the next branch
runs-on: ubuntu-latest
timeout-minutes: 10
needs:
- discover
- season
- sales_readiness
if: always()
steps:
- name: Check out repository
uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
with:
fetch-depth: 0
persist-credentials: false
- name: Recommend a branch without mutating the repository
env:
run: |
TARGET_BRANCH: ${{ needs.discover.outputs.target_branch }}
CURRENT_BRANCH: ${{ github.head_ref || github.ref_name }}
set -euo pipefail
target="${TARGET_BRANCH:-main}"
current="${CURRENT_BRANCH:-}"
then
if ! git show-ref --verify --quiet "refs/remotes/origin/${target}";
if git show-ref --verify --quiet refs/remotes/origin/main; then
target="main"
elif git show-ref --verify --quiet refs/remotes/origin/master; then
target="master"
fi
fi
best=""
reason="No non-default branch ahead of ${target} was visible on
origin."
if [[ -n "${current}" && "${current}" != "${target}" ]] && git show-
ref --verify --quiet "refs/remotes/origin/${current}"; then
ahead="$(git rev-list --count "origin/${target}..origin/${current}"
2>/dev/null || echo 0)"
behind="$(git rev-list --count "origin/${current}..origin/${target}" 2>/dev/null
|| echo 0)"
if (( ahead > 0 )); then
best="${current}"
reason="${current} is ${ahead} commit(s) ahead of ${target} and $
{behind} commit(s) behind."
fi
fi
if [[ -z "${best}" ]]; then
while IFS='|' read -r ref updated; do
clean="${ref#origin/}"
[[ -z "${clean}" || "${clean}" == "HEAD" || "${clean}" == "$
{target}" || "${clean}" == "main" || "${clean}" == "master" ]] && continue
ahead="$(git rev-list --count "origin/${target}..${ref}" 2>/dev/
null || echo 0)"
behind="$(git rev-list --count "${ref}..origin/${target}" 2>/dev/
null || echo 999999)"
if (( ahead > 0 && behind <= 50 )); then
best="${clean}"
reason="${clean} is ${ahead} commit(s) ahead of ${target} and $
{behind} commit(s) behind."
break
fi
done < <(git for-each-ref refs/remotes/origin --format='%
(refname:short)|%(committerdate:iso8601)' --sort=-committerdate)
fi
{
echo "## Branch advisor"
echo
echo "- Target branch: \`${target}\`"
echo "- Current branch context: \`${current:-n/a}\`"
if [[ -n "${best}" ]]; then
echo "- Recommended next branch: \`${best}\`"
echo "- Reason: ${reason}"
else
echo "- Recommended next branch: none"
echo "- Reason: ${reason}"
fi
echo
echo "This job only recommends. It does not push, merge, delete
branches, or edit repository content."
} >> "$GITHUB_STEP_SUMMARY"
